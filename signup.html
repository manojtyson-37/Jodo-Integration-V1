<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Jodo Developer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="auth-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Get instant sandbox access</p>
        </div>
        
        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="email" placeholder="dev_user@jodo.io" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="auth-button">Initialize Sandbox</button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="/">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Initializing...';
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    alert('Success! Please login to continue.');
                    window.location.href = '/';
                } else {
                    alert(data.message);
                    btn.textContent = 'Initialize Sandbox';
                }
            } catch (err) {
                alert('Connection failed to backend');
                btn.textContent = 'Initialize Sandbox';
            }
        });
    </script>
</body>
</html>
