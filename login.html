<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Jodo Developer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="auth-container">
        <div class="auth-header">
            <h1>Jodo</h1>
            <p>Developer Portal</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="email" placeholder="dev_user@jodo.io" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="auth-button">Sign In to Portal</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="/signup">Create an Account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Authenticating...';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    localStorage.setItem('jodo_user', JSON.stringify(data.user));
                    window.location.href = '/console-home';
                } else {
                    alert(data.message);
                    btn.textContent = 'Sign In to Portal';
                }
            } catch (err) {
                alert('Connection failed to backend');
                btn.textContent = 'Sign In to Portal';
            }
        });
    </script>
</body>
</html>
